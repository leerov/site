name: Deploy Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Build project
        run: bun run build
        
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync (только собранные файлы)
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            .next/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/site/.next/
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" \
            package.json package-lock.json next.config.js \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/site/

      - name: Restart application on server
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/site && pm2 restart site || pm2 start npm --name site -- start"
