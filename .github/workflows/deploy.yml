name: Deploy Site

on:
  push:
    branches: [ main ]          # автоматически при пуше в main
  workflow_dispatch:            # или вручную из интерфейса

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync (только собранные файлы)
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            .next/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/site/.next/
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" \
            package.json package-lock.json next.config.js \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/site/

      - name: Restart application on server
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/site && pm2 restart site || pm2 start npm --name site -- start"
