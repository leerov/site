name: Deploy Site (Static)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            # Установка Bun, если не установлен
            if ! command -v bun &> /dev/null; then
              echo "Bun not found, installing..."
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"
            fi
            cd /home/leerov/site
            git pull origin main
            bun install
            bun run build
            rsync -av --delete out/ /var/www/leerov/
            # Перезапуск сервера через Makefile (если используется)
            if [ -f Makefile ]; then
              echo "Restarting server via make..."
              make restart
            else
              echo "Makefile not found, skipping server restart."
            fi
          EOF
