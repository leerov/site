name: Deploy Site (Static)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Удаляем серверные API-роуты, чтобы избежать ошибок при статическом экспорте
      - name: Remove server-side API routes
        run: rm -rf src/app/api

      # Генерируем Prisma Client (если он нужен для клиентского кода, но лучше вообще убрать зависимость от prisma в клиенте)
      - name: Generate Prisma Client (optional)
        run: bunx prisma generate || true   # игнорируем ошибку, если prisma нет

      - name: Build and export static site
        run: |
          bun run build   # создаст папку out/, если в next.config.js указано output: 'export'

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy static files to /var/www/leerov
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./out/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/leerov/
